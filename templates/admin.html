<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-orange-600">Curma</h1>
        <a href="/logout" class="text-gray-500 hover:text-red-600 font-medium">Logout</a>
    </nav>

    <div class="max-w-6xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-bold mb-6">Add New Event</h2>
            <form action="/admin" method="POST" class="space-y-4">
                <input type="text" name="title" placeholder="Event Name (e.g., Pookalam)" required class="w-full p-3 border rounded-lg focus:ring-orange-500">
                <input type="text" name="time" placeholder="Timing (e.g., 9:00 AM)" required class="w-full p-3 border rounded-lg">
                <input type="text" name="venue" placeholder="Venue" required class="w-full p-3 border rounded-lg">
                <textarea name="description" placeholder="Short Description..." rows="4" required class="w-full p-3 border rounded-lg"></textarea>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-all">
                    Publish Event
                </button>
            </form>
        </div>

        <div class="lg:col-span-2">
            <h2 class="text-xl font-bold mb-6 text-gray-800">Current Schedule</h2>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4 font-bold text-gray-600">Event</th>
                            <th class="px-6 py-4 font-bold text-gray-600">Time/Venue</th>
                            <th class="px-6 py-4 font-bold text-gray-600 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y">
                        {% for event in events %}
                        <tr class="hover:bg-orange-50 transition-colors">
                            <td class="px-6 py-4 font-semibold text-gray-800">{{ event.title }}</td>
                            <td class="px-6 py-4 text-sm text-gray-500">{{ event.time }} | {{ event.venue }}</td>
                            <td class="px-6 py-4 text-right">
                                <button class="text-red-500 hover:text-red-700 font-medium">Delete</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
